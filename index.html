<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xiaolan-Home</title>
  <link id="favicon" rel="icon" href="./favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Custom Cursor -->
  <div class="cursor-dot" id="cursor"></div>

  <!-- Background -->
  <div class="bg-layer">
    <img class="bg-image" src="" alt="">
    <div class="bg-overlay"></div>
  </div>

  <div class="container">

    <!-- Hero -->
    <section class="hero">
      <div class="avatar-wrapper">
        <div class="avatar" id="avatar">
          <img src="" alt="avatar">
        </div>
      </div>
      <h1 class="name"></h1>
      <p class="tagline"></p>
    </section>

    <!-- Dynamic Sections -->
    <div id="sections"></div>

    <!-- Footer -->
    <footer class="footer scroll-reveal">
      <p></p>
      <span class="time" id="live-time"></span>
    </footer>

  </div>

  <!-- Back to Top -->
  <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
